            .sidebar a {
             display: block;
            text-decoration: none;
            color: #f7f3f3;
            background:#496986 ;
            border: 1px solid #bbbcc0;
            padding: 10px 12px;
            border-radius: 10px;
            transition: background .15s ease, border-color .15s ease;
            }
            .sidebar a:hover { background: #c5c8ca; border-color: #a7a9ac; }
            /* LEFT CONTENT AREA */
            .content {

                border-radius: 15px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);

            .container {

            gap: 24px;
