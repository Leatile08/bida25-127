<!DOCTYPE html>
<html>
    <head>
        <title>Application Form</title>
        <style>
            .container { 
            background-color: rgba(255, 255, 255, 0.9);
            margin: 40px auto; 
            padding: 30px; 
            max-width: 700px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            left: 50px;} 
          body{
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-size: cover;
            background-position: center;
            color: #333;
            background-image: url(images/background.jpg);} 
          header{
            background-color: rgb(45, 140, 140);
            padding: 20px;
            text-align: center;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
          footer{
            background-color: rgb(32, 35, 35);
            position: fixed;
            bottom: 0;
            text-align: center;
            left: 0;
            right: 0;}
        /* --- Nice form layout --- */
        form{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 18px;
        }
        .full{ 
            grid-column: 1 / -1; 
        }
        label{
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }
        input, select{
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 15px;
            background: #fff;
            outline: none;
        }
        input:focus,select:focus{
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
        }
        .hint{
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: #6b7280;
        }
        /* --- Buttons --- */
        .actions{
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 4px;
        }
        button{
            appearance: none;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-weight: 600;
            cursor: pointer;
        }
        button:active{transform: translateY(1px);}
        .btn-primary{
            background: #2563eb;
            color: #fff;
            box-shadow: 0 6px rgba(37,99,235,0.25);
        }
        .btn-primary:hover{ background: #1e49b8; }
        
        .btn-ghost{
        background: transparent;
        color: #111827;
        border: 1px solid #e5e7eb;
        }
        
        .btn-ghost:hover{
        background: #f8fafc;
        }
        
        /* Responsive */
        @media (max-width: 640px){
        form{ grid-template-columns: 1fr; }
        .actions{ justify-content: stretch; }
        .actions button{ flex: 1; }
        }
        .sidebar {
            width: 260px;
            background: rgb(32, 35, 35);
            border-radius: 12px;
            padding: 16px;
            color: white;
            }
            .sidebar h2 { margin: 0 0 10px; font-size: 1.1rem;color: #e5e7eb; }
            .sidebar ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
            .sidebar a {
             display: block;
            text-decoration: none;
            color: #f7f3f3;
            background: #496986;
            border: 1px solid #bbbcc0;
            padding: 10px 12px;
            border-radius: 10px;
            transition: background .15s ease, border-color .15s ease;
            }
            .sidebar a:hover { background: #666b70; border-color: #a7a9ac; }
            /* LEFT CONTENT AREA */
            .content {
                flex: 1;  
                background-color: rgba(151, 146, 146, 0.9);
                padding: 30px;
                border-radius: 15px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);

            }
            .container {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            padding: 20px;
            }
            .page-wrapper{
                display: flex;
                gap: 24px;
                align-items: flex-start;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Application Form</h1>
        </header>
        <!--MAIN FLEX LAYOUT-->
        <div class="page-wrapper">
            <!-- LEFT: FORM CONTENT-->
             <div class="container">
             <!--Add action/method if you are posting to a server-->
                <form>
                    <div>
                      <label for="fname">First name:</label><br>
                      <input type="text" id="fname" name="fname" value=""><br>  
                    </div>
                    <div>
                       <label for="lname">Last name:</label><br>
                       <input type="text" id="lname" name="lname" value="">  
                    </div>
                    <div>
                       <label for="estatus">Employment Status:</label><br>
                       <select id="estatus" name="estatus" required>
                       <option value="" disabled selected>Select status</option>
                       <option>Employed</option>
                       <option>Self-employed</option>
                       <option>Student</option>
                       <option>Unemployed</option>
                       </select>
                    </div>
                    <div>
                       <label for="employer">Employer:</label><br>
                       <input type="text" id="employer" name="employer" value=""> 
                       <small class="hint">If unemployed, type "N/A".</small>
                    </div>
                    <div>
                       <label for="sincome">Source of Income</label><br>
                       <input type="text" id="sincome" name="sincome" value="">
                    </div>
                    <div>
                       <label for="mincome">Monthly Income</label><br>
                       <input type="text" id="mincome" name="mincome" value=""> 
                    </div>
                    <DIV>
                        <label for="dproduct">Desired Product</label><br>
                        <input type="text" id="dproduct" name="dproduct"value="">
                        <!-- Actions -->
                        <div class="actions full">
                           <button type="reset" class="btn-ghost">Reset</button>
                           <button type="submit" class="btn-primary">Submit Application</button>
                        </div>
                    </DIV>
                </form>
             </div>
             <!--RIGHT:SIDEBAR MENU-->
            <aside class="sidebar" aria-label="Main menu">
                <h2>Menu</h2>
                    <ul>
                         <li><a href="index.html">Home</a></li>
                         <li><a href="Product page.html">Product Page</a></li>
                         <li><a href="Application Form.html">Application form</a></li>
                         <li><a href="About us.html">About MLS</a></li>
                         <li><a href="Contact Page.html">Contact</a></li>
                         <li><a href="FAQ Page.html">FAQ</a></li> 
                         <li><a href="table.html">Agent Directory</a></li> 
                    </ul>
            </aside>
        </div>
        <footer>
            <p>&copy; 2025 Mogende Loan Services</p>
        </footer>
        <!-- Optional: Simple client-side feedback (no backend needed) -->
    </body>
</html>
